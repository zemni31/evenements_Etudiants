<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{register.title}">Inscription</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="text-end p-2">
    <a href="/change-lang?lang=fr">🇫🇷 FR</a> |
    <a href="/change-lang?lang=en">🇬🇧 EN</a> |
    <a href="/change-lang?lang=ar">🇸🇦 AR</a>
</div>

<div class="container" style="max-width:400px; margin-top:60px;">
    <div class="card shadow-sm p-4">
        <h2 class="text-center mb-4" th:text="#{register.title}">Créer un compte</h2>

        <!-- Erreur globale (email déjà pris) -->
        <div th:if="${errorMessage}" class="alert alert-danger"
             th:text="#{${errorMessage}}">Erreur</div>

        <form method="post" action="/register" th:object="${user}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Nom -->
            <div class="mb-3">
                <label class="form-label" th:text="#{register.name}">Nom</label>
                <input type="text" th:field="*{name}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}">Erreur nom</div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label" th:text="#{register.email}">Email</label>
                <input type="email" th:field="*{email}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                     th:errors="*{email}">Erreur email</div>
            </div>

            <!-- Mot de passe -->
            <div class="mb-3">
                <label class="form-label" th:text="#{register.password}">Mot de passe</label>
                <input type="password" th:field="*{password}"
                       class="form-control"/>
            </div>

            <button type="submit" class="btn btn-success w-100" th:text="#{register.submit}">
                S'inscrire
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/login" th:text="#{register.login.link}">Déjà un compte ?</a>
        </div>
    </div>
</div>
</body>
</html>
