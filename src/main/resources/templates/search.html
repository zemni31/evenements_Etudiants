<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{search.title}">Recherche</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<!-- Barre de navigation -->
<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand" th:text="#{nav.title}">Portail</span>

    <div class="d-flex align-items-center gap-3">
        <!-- Nom de l'utilisateur connecté -->
        <span class="text-white">
      👤 <sec:authentication property="name"/>
    </span>

        <!-- Changement de langue -->
        <a href="/change-lang?lang=fr" class="text-white text-decoration-none">🇫🇷</a>
        <a href="/change-lang?lang=en" class="text-white text-decoration-none">🇬🇧</a>
        <a href="/change-lang?lang=ar" class="text-white text-decoration-none">🇸🇦</a>

        <!-- Bouton déconnexion -->
        <form method="post" action="/logout" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{nav.logout}">
                Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="#{search.title}">Recherche</h2>

    <!-- Barre de recherche -->
    <form method="get" action="/search" class="d-flex gap-2 mb-4">
        <input type="text" name="keyword" class="form-control"
               th:value="${keyword}"
               th:placeholder="#{search.placeholder}"/>
        <button type="submit" class="btn btn-primary" th:text="#{search.button}">
            Rechercher
        </button>
    </form>

    <!-- Résultats -->
    <h4 th:text="#{search.results}">Résultats</h4>

    <div th:if="${events.empty}" class="alert alert-info" th:text="#{search.no.results}">
        Aucun résultat.
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-3">
        <div class="col" th:each="event : ${events}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${event.title}">Titre</h5>
                    <span class="badge bg-secondary mb-2" th:text="${event.type}">Type</span>
                    <p class="card-text text-muted" th:text="${event.description}">Description</p>
                    <small class="text-muted">
                        📍 <span th:text="${event.location}">Lieu</span>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
