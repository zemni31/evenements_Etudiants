<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- Drapeaux de langue -->
<div class="text-end p-2">
    <a href="/change-lang?lang=fr">🇫🇷 FR</a> |
    <a href="/change-lang?lang=en">🇬🇧 EN</a> |
    <a href="/change-lang?lang=ar">🇸🇦 AR</a>
</div>

<div class="container" style="max-width:400px; margin-top:80px;">
    <div class="card shadow-sm p-4">
        <h2 class="text-center mb-4" th:text="#{login.title}">Connexion</h2>

        <!-- Message succès inscription -->
        <div th:if="${param.registered}" class="alert alert-success" th:text="#{login.success}"></div>
        <!-- Message erreur connexion -->
        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}"></div>
        <!-- Message déconnexion -->
        <div th:if="${param.logout}" class="alert alert-info" th:text="#{login.logout}">Déconnecté avec succès.</div>

        <!-- Spring Security gère le POST /login automatiquement -->
        <form method="post" th:action="@{/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label" th:text="#{login.email}">E-mail</label>
                <input type="email" name="username" class="form-control" required/>
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{login.password}">Mot de passe</label>
                <input type="password" name="password" class="form-control" required/>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" name="remember-me" class="form-check-input" id="rememberMe"/>
                <label class="form-check-label" for="rememberMe" th:text="#{login.rememberme}">
                    Se souvenir de moi
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100" th:text="#{login.submit}">
                Se connecter
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/register" th:text="#{login.register.link}">Pas encore de compte ?</a>
        </div>
    </div>
</div>
</body>
</html>
