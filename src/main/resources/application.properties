# Nom de l'application
spring.application.name=portail-evenements

# Base H2 persistante (fichier sauvegardé)
spring.datasource.url=jdbc:h2:file:./data/portaildb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mise à jour automatique du schéma (conserve les données)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requ�tes SQL dans la console (utile pour d�boguer)
spring.jpa.show-sql=true

# Active la console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Langue par défaut : français
spring.web.locale=fr

# Encodage UTF-8 pour les messages
spring.messages.encoding=UTF-8
spring.messages.basename=messages
